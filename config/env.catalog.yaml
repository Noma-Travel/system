# Central env catalog — structure only; values in profiles/ + Secrets Manager
# routing: true => affected by handler_overrides, not env profile alone

vars:
  WL_NAME:
    description: White-label application name
    secret: false
    consumers: [backend]
    required_in: [staging, production]

  BASE_URL:
    description: Backend API base URL
    secret: false
    routing: true
    consumers: [backend, noma, console]
    required_in: [staging, production]

  FE_BASE_URL:
    description: Frontend base URL
    secret: false
    consumers: [backend]
    required_in: [staging, production]

  APP_FE_BASE_URL:
    description: App frontend base URL for invite links
    secret: false
    consumers: [backend]
    required_in: [staging, production]

  DOC_BASE_URL:
    description: Documentation base URL
    secret: false
    consumers: [backend]
    required_in: [staging, production]

  API_GATEWAY_ARN:
    description: API Gateway ARN for cronjobs
    secret: false
    consumers: [backend]
    required_in: [staging, production]

  SYS_ENV:
    description: System environment identifier
    secret: false
    consumers: [backend]
    required_in: [staging, production]

  URL_PREFIX:
    description: Zappa URL prefix / stage name
    secret: false
    consumers: [backend]
    required_in: [staging, production]

  DYNAMODB_ENTITY_TABLE:
    description: DynamoDB entities table
    secret: false
    consumers: [backend]
    required_in: [staging, production]

  DYNAMODB_BLUEPRINT_TABLE:
    description: DynamoDB blueprints table
    secret: false
    consumers: [backend]
    required_in: [staging, production]

  DYNAMODB_RINGDATA_TABLE:
    description: DynamoDB ring data table
    secret: false
    consumers: [backend]
    required_in: [staging, production]

  DYNAMODB_REL_TABLE:
    description: DynamoDB relations table
    secret: false
    consumers: [backend]
    required_in: [staging, production]

  DYNAMODB_CHAT_TABLE:
    description: DynamoDB chat table
    secret: false
    consumers: [backend]
    required_in: [staging, production]

  COGNITO_REGION:
    description: AWS Cognito region
    secret: false
    consumers: [backend, console]
    required_in: [staging, production]

  COGNITO_USERPOOL_ID:
    description: Cognito user pool ID
    secret: false
    consumers: [backend, noma, console]
    required_in: [staging, production]

  COGNITO_APP_CLIENT_ID:
    description: Cognito app client ID
    secret: false
    consumers: [backend, noma, console]
    required_in: [staging, production]

  COGNITO_CHECK_TOKEN_EXPIRATION:
    description: Validate Cognito token expiration
    secret: false
    consumers: [backend]
    required_in: [staging, production]

  CSRF_SESSION_KEY:
    description: Flask CSRF session key
    secret: true
    consumers: [backend]
    required_in: [staging, production]

  SECRET_KEY:
    description: Flask secret key
    secret: true
    consumers: [backend]
    required_in: [staging, production]

  S3_BUCKET_NAME:
    description: S3 bucket name
    secret: false
    consumers: [backend, noma]
    required_in: [staging, production]

  WEBSOCKET_CONNECTIONS:
    description: API Gateway WebSocket management endpoint (HTTPS)
    secret: false
    routing: true
    consumers: [backend, noma, console]
    required_in: [staging, production]

  ALLOW_DEV_ORIGINS:
    description: Allow local dev CORS origins on backend
    secret: false
    consumers: [backend]
    required_in: [staging, production]

  OPENAI_API_KEY:
    description: OpenAI API key
    secret: true
    consumers: [backend]
    required_in: [staging, production]

  RESEND_API_KEY:
    description: Resend email API key
    secret: true
    consumers: [backend, noma]
    required_in: [staging, production]

  INVITE_FROM:
    description: Invitation email From header
    secret: false
    consumers: [backend]
    required_in: [staging, production]

  SES_INVITE_SENDER:
    description: Legacy invite sender fallback
    secret: false
    consumers: [backend]
    required_in: [staging, production]

  NOMA_ROLE_ENFORCEMENT:
    description: Role-based access enforcement flag
    secret: false
    consumers: [backend]
    required_in: [staging, production]

  VITE_API_URL:
    description: Console API URL
    secret: false
    routing: true
    consumers: [console]
    required_in: [staging, production]

  VITE_WEBSOCKET_URL:
    description: Console WebSocket URL
    secret: false
    routing: true
    consumers: [console]
    required_in: [staging, production]

  VITE_EXTENSIONS:
    description: Console extension packages
    secret: false
    consumers: [console]
    required_in: [staging, production]

  VITE_WL_LOGO:
    description: Console white-label small logo path
    secret: false
    consumers: [console]
    required_in: [staging, production]

  VITE_WL_LOGIN:
    description: Console white-label login logo path
    secret: false
    consumers: [console]
    required_in: [staging, production]

  VITE_DEV_MODE:
    description: Console dev mode flag
    secret: false
    consumers: [console]
    required_in: [staging, production]

  NEXT_PUBLIC_API_BASE_URL:
    description: NOMA REST API base URL
    secret: false
    routing: true
    consumers: [noma]
    required_in: [staging, production]

  NEXT_PUBLIC_CHAT_WS:
    description: NOMA chat WebSocket URL
    secret: false
    routing: true
    consumers: [noma]
    required_in: [staging, production]

  NEXT_PUBLIC_AWS_USER_POOL_ID:
    description: NOMA Cognito pool ID
    secret: false
    consumers: [noma]
    required_in: [staging, production]

  NEXT_PUBLIC_AWS_USER_POOL_CLIENT_ID:
    description: NOMA Cognito client ID
    secret: false
    consumers: [noma]
    required_in: [staging, production]

  NEXT_PUBLIC_PORTFOLIO_ID:
    description: NOMA default portfolio (local/E2E only)
    secret: false
    consumers: [noma]
    required_in: []

  NEXT_PUBLIC_ORG_ID:
    description: NOMA default org (local/E2E only)
    secret: false
    consumers: [noma]
    required_in: []
