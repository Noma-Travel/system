name: Deploy Backend (Staging)

on:
  push:
    branches: [staging]
  repository_dispatch:
    types:
      - backend-staging-updated
      - renglo-lib-staging-updated
      - renglo-api-staging-updated
      - pes-noma-staging-updated
      - schd-staging-updated

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    uses: ./.github/workflows/deploy-backend-reusable.yml
    with:
      zappa_stage: noma_staging
      requirements_file: requirements.ci.staging.txt
      enforce_prod_cors: false
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      GH_PAT: ${{ secrets.GH_PAT }}
      ZAPPA_SETTINGS: ${{ secrets.ZAPPA_SETTINGS_STAGING }}
