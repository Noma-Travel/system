name: Deploy Backend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout system repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Configure AWS profile for Zappa
        run: |
          mkdir -p ~/.aws
          echo "[noma]" > ~/.aws/credentials
          echo "aws_access_key_id = ${{ secrets.AWS_ACCESS_KEY_ID }}" >> ~/.aws/credentials
          echo "aws_secret_access_key = ${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> ~/.aws/credentials
          echo "[profile noma]" > ~/.aws/config
          echo "region = us-east-1" >> ~/.aws/config
          echo "output = json" >> ~/.aws/config

      - name: Configure git for private repos
        run: |
          git config --global url."https://${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Create virtual environment and install tools
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install zappa setuptools

      - name: Install application dependencies
        run: |
          source venv/bin/activate
          pip install -r requirements.ci.txt

      - name: Write zappa_settings.json from secret
        run: echo '${{ secrets.ZAPPA_SETTINGS }}' > zappa_settings.json

      - name: Validate required CORS environment variables
        run: |
          python - <<'PY'
          import json
          import sys
          from urllib.parse import urlparse

          with open("zappa_settings.json", "r", encoding="utf-8") as fh:
              data = json.load(fh)

          stage = data.get("noma_prod") or {}
          env = stage.get("environment_variables") or {}

          required = ("FE_BASE_URL", "APP_FE_BASE_URL", "CORS_ALLOWED_ORIGINS")
          missing = [k for k in required if not str(env.get(k, "")).strip()]
          if missing:
              print(f"ERROR: Missing required zappa env vars: {', '.join(missing)}")
              sys.exit(1)

          def normalize_origin(value: str) -> str:
              v = (value or "").strip().rstrip("/")
              p = urlparse(v)
              if p.scheme not in ("http", "https") or not p.netloc:
                  raise ValueError(f"invalid origin: {value!r}")
              if p.path not in ("", "/"):
                  raise ValueError(f"origin must not include path: {value!r}")
              return f"{p.scheme}://{p.netloc}"

          fe_origin = normalize_origin(str(env.get("FE_BASE_URL", "")))
          app_fe_origin = normalize_origin(str(env.get("APP_FE_BASE_URL", "")))
          cors_raw = str(env.get("CORS_ALLOWED_ORIGINS", ""))
          cors_origins = {
              normalize_origin(part)
              for part in cors_raw.split(",")
              if part.strip()
          }
          expected = {fe_origin, app_fe_origin}
          missing_from_cors = sorted(expected - cors_origins)
          if missing_from_cors:
              print(
                  "ERROR: CORS_ALLOWED_ORIGINS must include FE_BASE_URL and APP_FE_BASE_URL. "
                  f"Missing: {', '.join(missing_from_cors)}"
              )
              sys.exit(1)

          allow_dev = str(env.get("ALLOW_DEV_ORIGINS", "")).strip().lower()
          if allow_dev in {"1", "true", "yes", "on"}:
              print("ERROR: ALLOW_DEV_ORIGINS must be false/empty in noma_prod")
              sys.exit(1)

          print("zappa_settings.json validation OK for CORS-critical variables")
          PY

      - name: Deploy with manual packaging script
        run: |
          source venv/bin/activate
          chmod +x ./zappa_update.sh
          ./zappa_update.sh noma_prod update
