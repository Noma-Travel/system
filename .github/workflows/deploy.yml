name: Deploy Backend (Production)

on:
  push:
    branches: [main]
  repository_dispatch:
    types:
      - backend-main-updated
      - renglo-lib-main-updated
      - renglo-api-main-updated
      - pes-noma-main-updated
      - schd-main-updated

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    uses: ./.github/workflows/deploy-backend-reusable.yml
    with:
      zappa_stage: noma_prod
      requirements_file: requirements.ci.txt
      enforce_prod_cors: true
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      GH_PAT: ${{ secrets.GH_PAT }}
      ZAPPA_SETTINGS: ${{ secrets.ZAPPA_SETTINGS }}

  post_deploy:
    needs: deploy
    uses: ./.github/workflows/post-deploy-reusable.yml
    with:
      env_name: noma-prod
      zappa_stage: noma_prod
      requirements_file: requirements.ci.txt
      backend_git_ref: main
      sync_orgs_env_var: DEPLOY_SYNC_ORGS
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      GH_PAT: ${{ secrets.GH_PAT }}
      ZAPPA_SETTINGS: ${{ secrets.ZAPPA_SETTINGS }}
      SYNC_ORGS: ${{ secrets.DEPLOY_SYNC_ORGS }}
