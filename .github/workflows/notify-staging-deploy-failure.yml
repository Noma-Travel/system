name: Notify Staging Deploy Failure

# Runs after "Deploy Backend (Staging)" completes; avoids nesting two reusable workflows
# in deploy-staging.yml (which caused workflow parse failures on GitHub).

on:
  workflow_run:
    workflows: ["Deploy Backend (Staging)"]
    types: [completed]
    branches: [staging]

permissions:
  actions: read
  contents: read

jobs:
  notify:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    uses: ./.github/workflows/notify-deploy-failure.yml
    with:
      environment_label: staging
      deploy_result: failure
      post_deploy_result: skipped
      secondary_job_label: post_deploy deferred
    secrets:
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      DEPLOY_ALERT_FROM: ${{ secrets.DEPLOY_ALERT_FROM }}
      SLACK_DEPLOY_TEAM_WEBHOOK_URL: ${{ secrets.SLACK_DEPLOY_TEAM_WEBHOOK_URL }}
      GH_PAT: ${{ secrets.GH_PAT }}
      USER_EMAIL_MAP: ${{ secrets.USER_EMAIL_MAP }}
