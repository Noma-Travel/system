name: Notify Deploy Failure (reusable, compat wrapper)

# Backward-compatible wrapper. Existing callers that reference this file keep working;
# all logic now lives in notify-deploy.yml. New callers should use notify-deploy.yml
# directly with `outcome: failure`.

on:
  workflow_call:
    inputs:
      environment_label:
        description: Human-readable environment (e.g. production, staging)
        required: true
        type: string
      deploy_result:
        description: Result of deploy job (success, failure, skipped, etc.)
        required: true
        type: string
      post_deploy_result:
        description: Result of post_deploy job
        required: true
        type: string
      alert_type:
        description: "deploy | ci_gate"
        required: false
        type: string
        default: deploy
      primary_job_label:
        description: Label for the first monitored job in failure messages
        required: false
        type: string
        default: deploy (Zappa)
      secondary_job_label:
        description: Label for the second monitored job in failure messages
        required: false
        type: string
        default: post_deploy (blueprints/tools)
    secrets:
      RESEND_API_KEY:
        required: false
      DEPLOY_ALERT_FROM:
        required: false
      SLACK_DEPLOY_TEAM_WEBHOOK_URL:
        required: false
      GH_PAT:
        required: false
      USER_EMAIL_MAP:
        required: false

jobs:
  notify:
    uses: ./.github/workflows/notify-deploy.yml
    with:
      environment_label: ${{ inputs.environment_label }}
      outcome: failure
      alert_type: ${{ inputs.alert_type }}
      deploy_result: ${{ inputs.deploy_result }}
      post_deploy_result: ${{ inputs.post_deploy_result }}
      primary_job_label: ${{ inputs.primary_job_label }}
      secondary_job_label: ${{ inputs.secondary_job_label }}
    secrets:
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      DEPLOY_ALERT_FROM: ${{ secrets.DEPLOY_ALERT_FROM }}
      SLACK_DEPLOY_TEAM_WEBHOOK_URL: ${{ secrets.SLACK_DEPLOY_TEAM_WEBHOOK_URL }}
      GH_PAT: ${{ secrets.GH_PAT }}
      USER_EMAIL_MAP: ${{ secrets.USER_EMAIL_MAP }}
