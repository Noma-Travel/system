name: Post-Deploy Sync (reusable)

on:
  workflow_call:
    inputs:
      env_name:
        description: DynamoDB env prefix (e.g. noma-prod, noma-staging)
        required: true
        type: string
      zappa_stage:
        description: Zappa stage key inside zappa_settings.json
        required: true
        type: string
      requirements_file:
        description: pip requirements file relative to system repo root
        required: true
        type: string
      backend_git_ref:
        description: backend repo ref for installer scripts and blueprints
        required: true
        type: string
      sync_orgs_env_var:
        description: Environment variable name holding sync orgs JSON
        required: true
        type: string
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      GH_PAT:
        required: true
      ZAPPA_SETTINGS:
        required: true
      SYNC_ORGS:
        required: false

jobs:
  post_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout system repo
        uses: actions/checkout@v4

      - name: Checkout backend repo (installer + blueprints)
        uses: actions/checkout@v4
        with:
          repository: Noma-Travel/backend
          ref: ${{ inputs.backend_git_ref }}
          path: backend
          token: ${{ secrets.GH_PAT }}

      - name: Checkout extension repos (blueprints)
        uses: actions/checkout@v4
        with:
          repository: Noma-Travel/schd
          ref: ${{ inputs.backend_git_ref }}
          path: schd
          token: ${{ secrets.GH_PAT }}

      - name: Checkout pes_noma (blueprints)
        uses: actions/checkout@v4
        with:
          repository: Noma-Travel/pes_noma
          ref: ${{ inputs.backend_git_ref }}
          path: pes_noma
          token: ${{ secrets.GH_PAT }}

      - name: Checkout claw (blueprints)
        uses: actions/checkout@v4
        with:
          repository: Noma-Travel/claw
          ref: main
          path: claw
          token: ${{ secrets.GH_PAT }}

      - name: Checkout inca (blueprints)
        uses: actions/checkout@v4
        with:
          repository: Noma-Travel/Inca
          ref: main
          path: inca
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Configure AWS profile for scripts
        run: |
          mkdir -p ~/.aws
          echo "[noma]" > ~/.aws/credentials
          echo "aws_access_key_id = ${{ secrets.AWS_ACCESS_KEY_ID }}" >> ~/.aws/credentials
          echo "aws_secret_access_key = ${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> ~/.aws/credentials
          echo "[profile noma]" > ~/.aws/config
          echo "region = us-east-1" >> ~/.aws/config
          echo "output = json" >> ~/.aws/config

      - name: Configure git for private repos
        run: |
          git config --global url."https://${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Install Python dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install boto3
          pip install -r "${{ inputs.requirements_file }}"

      - name: Write zappa_settings.json from secret
        run: echo '${{ secrets.ZAPPA_SETTINGS }}' > zappa_settings.json

      - name: Export Lambda environment variables for handlers
        env:
          ZAPPA_STAGE: ${{ inputs.zappa_stage }}
        run: |
          source venv/bin/activate
          python - <<'PY'
          import json
          import os

          stage = os.environ["ZAPPA_STAGE"]
          with open("zappa_settings.json", "r", encoding="utf-8") as fh:
              data = json.load(fh)
          env = (data.get(stage) or {}).get("environment_variables") or {}
          if not env:
              raise SystemExit(f"ERROR: no environment_variables for stage {stage!r}")

          with open("post_deploy.env", "w", encoding="utf-8") as out:
              for key, value in env.items():
                  text = str(value)
                  if any(ch in text for ch in ('"', "\n", " ")):
                      out.write(f'{key}="{text}"\n')
                  else:
                      out.write(f"{key}={text}\n")
          print(f"Wrote post_deploy.env with {len(env)} variables from stage {stage!r}")
          PY

      - name: Run post-deploy environment sync
        env:
          SYNC_ORGS_JSON: ${{ secrets.SYNC_ORGS }}
        run: |
          source venv/bin/activate
          if [ -n "${SYNC_ORGS_JSON}" ]; then
            export "${{ inputs.sync_orgs_env_var }}=${SYNC_ORGS_JSON}"
            echo "Using explicit org list from ${{ inputs.sync_orgs_env_var }} secret"
          else
            echo "No org sync secret set — discovering all orgs from DynamoDB"
          fi
          python backend/installer/noma_post_deploy_env.py \
            --env-file post_deploy.env \
            --env-name "${{ inputs.env_name }}" \
            --aws-profile noma \
            --aws-region us-east-1 \
            --sync-orgs-env-var "${{ inputs.sync_orgs_env_var }}" \
            --sync-all-orgs \
            --tools-mode reset \
            --validate
